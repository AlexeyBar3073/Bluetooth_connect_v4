; PlatformIO Project Configuration File
;
; Project: Bluetooth_connect_v2
; Architecture: Packet-based Pub/Sub (9 aggregated packets)
; Firmware: v6.1.1

[common]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
lib_deps_base =
	bblanchon/ArduinoJson
build_flags_common =
	-DCONFIG_ARDUHAL_LOG_COLORS=1
	-DCONFIG_FREERTOS_UNICORE=0
	-I src/common
	-I include
	-D REAL_ENGINE_ENABLED=0

; =============================================================================
; DEBUG: OLED + отладочные логи + симулятор
; =============================================================================
[env:wemos_d1_mini32]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
	${common.lib_deps_base}
	olikraus/U8g2
build_flags =
	${common.build_flags_common}
	-D DEBUG_LOG=1
	-D OLED_ENABLED=0
	-D configMAX_QUEUES=40
extra_scripts = post:extra_script.py

; =============================================================================
; RELEASE: без OLED, без отладки — минимум Flash
; =============================================================================
[env:wemos_d1_mini32_release]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
	${common.lib_deps_base}
build_flags =
	${common.build_flags_common}
	-D DEBUG_LOG=0
	-D OLED_ENABLED=0
	-D configMAX_QUEUES=40
extra_scripts = post:extra_script.py
